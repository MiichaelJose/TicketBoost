<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g" x1="30" y1="30" x2="98" y2="98" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#A855F7"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Ticket background -->
  <rect x="14" y="14" width="100" height="100" rx="24" fill="#0A0A0B" stroke="url(#g)" stroke-width="8"/>
  
  <!-- Lightning bolt -->
  <path d="M64 36 L48 68 L62 68 L54 96 L82 58 L64 58 L74 36 Z" fill="url(#g)" filter="url(#glow)"/>
</svg>
